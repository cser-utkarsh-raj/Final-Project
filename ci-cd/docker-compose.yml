services:
  mysql-db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  discovery-server:
    build: ../backend/discovery-server
    ports:
      - "8761:8761"

  config-server:
    build: ../backend/config-server
    ports:
      - "8888:8888"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server

  auth-service:
    build: ../backend/auth-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: stationery-management-local-secret-key-that-is-long-enough-for-hmac
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/authdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
    depends_on:
      discovery-server:
        condition: service_started
      mysql-db:
        condition: service_healthy

  inventory-service:
    build: ../backend/inventory-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: stationery-management-local-secret-key-that-is-long-enough-for-hmac
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/inventorydb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
    depends_on:
      discovery-server:
        condition: service_started
      mysql-db:
        condition: service_healthy

  request-service:
    build: ../backend/request-service
    ports:
      - "8083:8083"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      JWT_SECRET: stationery-management-local-secret-key-that-is-long-enough-for-hmac
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/requestdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
    depends_on:
      discovery-server:
        condition: service_started
      inventory-service:
        condition: service_started
      mysql-db:
        condition: service_healthy

  api-gateway:
    build: ../backend/api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
      AUTH_SERVICE_URL: http://auth-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      REQUEST_SERVICE_URL: http://request-service:8083
    depends_on:
      auth-service:
        condition: service_started
      inventory-service:
        condition: service_started
      request-service:
        condition: service_started

  frontend:
    build: ../frontend
    ports:
      - "5175:80"
    depends_on:
      - api-gateway

volumes:
  mysql-data:
