services:
  discovery-server:
    build: ../backend/discovery-server
    ports:
      - "8761:8761"

  config-server:
    build: ../backend/config-server
    ports:
      - "8888:8888"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server

  auth-service:
    build: ../backend/auth-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: stationery-management-local-secret-key-that-is-long-enough-for-hmac
    depends_on:
      - discovery-server

  inventory-service:
    build: ../backend/inventory-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: stationery-management-local-secret-key-that-is-long-enough-for-hmac
    depends_on:
      - discovery-server

  request-service:
    build: ../backend/request-service
    ports:
      - "8083:8083"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      JWT_SECRET: stationery-management-local-secret-key-that-is-long-enough-for-hmac
    depends_on:
      - discovery-server
      - inventory-service

  api-gateway:
    build: ../backend/api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
      AUTH_SERVICE_URL: http://auth-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      REQUEST_SERVICE_URL: http://request-service:8083
    depends_on:
      - auth-service
      - inventory-service
      - request-service

  frontend:
    build: ../frontend
    ports:
      - "5175:80"
    depends_on:
      - api-gateway
