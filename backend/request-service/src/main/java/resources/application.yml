server:
  port: 8083

spring:
  application:
    name: request-service
  datasource:
    url: jdbc:h2:mem:requestdb
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:stationery-management-local-secret-key-that-is-long-enough-for-hmac}

inventory:
  service:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
